<html>
<head>
    <title>Test Table</title>
    <meta charset="UTF-8">       
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            width: 700px;
            text-align: center;
        }
        th, td {
            padding: 15px;
        }
    </style>
</head>
<body>
    <h1>Test Table</h1>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Alice</td>
            <td>30</td>
            <td>New York</td>
        </tr>
        <tr>
            <td>Bob</td>
            <td>25</td>
            <td>Los Angeles</td>
        </tr>
        <tr>
            <td>Charlie</td>
            <td>35</td>
            <td>Chicago</td>
        </tr>
    </table>
</body>
</html>
